name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PDFIUM_VERSION: "chromium/7749"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pdfium_asset: pdfium-linux-x64.tgz
            pdfium_lib: lib/libpdfium.so
            artifact_name: autodetect-pdf-fields-linux-x64
            archive_ext: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            pdfium_asset: pdfium-linux-arm64.tgz
            pdfium_lib: lib/libpdfium.so
            artifact_name: autodetect-pdf-fields-linux-arm64
            archive_ext: tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            pdfium_asset: pdfium-mac-x64.tgz
            pdfium_lib: lib/libpdfium.dylib
            artifact_name: autodetect-pdf-fields-macos-x64
            archive_ext: tar.gz

          - target: aarch64-apple-darwin
            os: macos-14
            pdfium_asset: pdfium-mac-arm64.tgz
            pdfium_lib: lib/libpdfium.dylib
            artifact_name: autodetect-pdf-fields-macos-arm64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download pdfium
        run: |
          curl -L -o /tmp/pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/${{ env.PDFIUM_VERSION }}/${{ matrix.pdfium_asset }}"
          mkdir -p /tmp/pdfium
          tar -xzf /tmp/pdfium.tgz -C /tmp/pdfium

      - name: Download ONNX model
        run: |
          curl -L -o /tmp/model_704_int8.onnx \
            "https://github.com/docusealco/fields-detection/releases/download/2.0.0/model_704_int8.onnx"

      - name: Package release archive
        run: |
          STAGING="/tmp/${{ matrix.artifact_name }}"
          mkdir -p "$STAGING"

          # Binary
          cp "target/${{ matrix.target }}/release/autodetect-pdf-fields" "$STAGING/"

          # Pdfium library
          cp "/tmp/pdfium/${{ matrix.pdfium_lib }}" "$STAGING/"

          # Model
          cp /tmp/model_704_int8.onnx "$STAGING/"

          # Docs
          cp README.md "$STAGING/"

          # Create archive
          cd /tmp
          tar -czf "${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
