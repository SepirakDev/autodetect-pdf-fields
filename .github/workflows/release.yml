name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PDFIUM_VERSION: "chromium/7749"

jobs:
  check-rust-changes:
    runs-on: ubuntu-latest
    outputs:
      rust_changed: ${{ steps.check.outputs.rust_changed }}
      previous_tag: ${{ steps.check.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Rust source changes since last release
        id: check
        run: |
          # Find the previous tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, building"
            echo "rust_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing $PREVIOUS_TAG to HEAD"

          # Check if any Rust-related files changed
          CHANGED=$(git diff --name-only "$PREVIOUS_TAG"..HEAD -- \
            'src/**' \
            'Cargo.toml' \
            'Cargo.lock' \
            'scripts/**' \
            '.github/workflows/release.yml')

          if [ -n "$CHANGED" ]; then
            echo "Rust source changed:"
            echo "$CHANGED"
            echo "rust_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Rust source changes, will reuse previous release artifacts"
            echo "rust_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-rust-changes
    if: needs.check-rust-changes.outputs.rust_changed == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pdfium_asset: pdfium-linux-x64.tgz
            pdfium_lib: lib/libpdfium.so
            artifact_name: autodetect-pdf-fields-linux-x64
            archive_ext: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            pdfium_asset: pdfium-mac-arm64.tgz
            pdfium_lib: lib/libpdfium.dylib
            artifact_name: autodetect-pdf-fields-macos-arm64
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download pdfium
        run: |
          curl -L -o /tmp/pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/${{ env.PDFIUM_VERSION }}/${{ matrix.pdfium_asset }}"
          mkdir -p /tmp/pdfium
          tar -xzf /tmp/pdfium.tgz -C /tmp/pdfium

      - name: Download ONNX model
        run: |
          curl -L -o /tmp/model_704_int8.onnx \
            "https://github.com/docusealco/fields-detection/releases/download/2.0.0/model_704_int8.onnx"

      - name: Package release archive
        run: |
          STAGING="/tmp/${{ matrix.artifact_name }}"
          mkdir -p "$STAGING"

          # Binary
          cp "target/${{ matrix.target }}/release/autodetect-pdf-fields" "$STAGING/"

          # Pdfium library
          cp "/tmp/pdfium/${{ matrix.pdfium_lib }}" "$STAGING/"

          # Model
          mkdir -p "$STAGING/models"
          cp /tmp/model_704_int8.onnx "$STAGING/models/"

          # Docs
          cp README.md "$STAGING/"

          # Create archive
          cd /tmp
          tar -czf "${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  # Copy artifacts from the previous release when Rust hasn't changed
  reuse:
    needs: check-rust-changes
    if: needs.check-rust-changes.outputs.rust_changed == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        artifact:
          - autodetect-pdf-fields-linux-x64.tar.gz
          - autodetect-pdf-fields-macos-arm64.tar.gz
    steps:
      - name: Download from previous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ needs.check-rust-changes.outputs.previous_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ matrix.artifact }}" \
            --dir /tmp/artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/artifacts/${{ matrix.artifact }}

  release:
    needs: [check-rust-changes, build, reuse]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
